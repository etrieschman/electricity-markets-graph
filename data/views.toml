# Views: curated subgraphs with narrative.
#
# Each [view-id] table defines one view. The members of the view are determined
# by the `views` column on nodes.csv (and optionally edges.csv). The fields
# below carry the view's metadata.

[iso-clearing]
name = "The ISO as central counterparty"
default_edge_types = ["money"]
layout = "concentric"
focus = "iso"
narrative = """
The ISO is the **central counterparty** for every centrally-cleared wholesale transaction. Buyers pay the market; the market aggregates settlement at the ISO; the ISO pays sellers. This view shows the clearing-house pattern — money flowing into the ISO from cleared markets and back out to participants — with bilateral and direct-payment flows visible as contrast.

**Inflows.** Five cleared markets each aggregate settlement at the ISO:

- **DAM** (energy): LSEs, traders, and storage-charging generators pay in (`lses/traders/generators → dam` money); DAM aggregates and remits to the ISO (`dam → iso` money). The difference between what loads pay and what generators are owed at congested nodes is congestion rent — the ISO holds this and routes it to FTR settlement.
- **RTM** (imbalance): same pattern (`rtm → iso`).
- **AS** (ancillary services): LSEs pay uplift, AS aggregates to ISO (`as → iso`).
- **Capacity**: LSEs pay capacity charges, capacity aggregates to ISO (`capacity → iso`).
- **FTR**: traders and LSEs pay auction buys; FTR aggregates auction revenue + settlement obligations to ISO (`ftr → iso`).

Plus two direct charges to the ISO:

- LSEs pay OATT/transmission-service charges and any FTR revenue-inadequacy uplift (`lses → iso` money). The OATT tariff sets the amount via `oatt → iso` information.
- Generators pay interconnection study deposits, capacity-performance penalties, and other administered charges (`generators → iso` money).

**Outflows.** Four destinations from the ISO:

- `iso → generators` — energy clearing (DAM/RTM), AS awards, capacity revenues, paid out from cleared-market collections.
- `iso → lses` — ARR cash distributions (per the ARR formula applied to FTR auction revenue), FTR settlements on LSE-held FTRs, RTM credits for DR/curtailment.
- `iso → traders` — FTR congestion settlements and net-positive virtual settlement revenues.
- `iso → to` — OATT/TRR remittance to TOs as cost-of-service compensation.

**The balance identity.** Per settlement run, *sum(inflows) = sum(outflows) + reserves*. The ISO doesn't retain profits; it administers. The classic mechanical chain: LSEs pay `LMP_load × MW` into the DAM, the ISO collects, and pays generators `LMP_gen × MW`. The residual — `(LMP_load − LMP_gen) × flow` summed across congested constraints — is the congestion rent that funds FTR settlement. Revenue inadequacy occurs when congestion rent collected doesn't fully fund cleared FTRs.

**What doesn't flow through the ISO.** Three categories of edges bypass the central-counterparty pattern:

- `lses → bilateral → generators` (and `customers → bilateral → generators`) — bilateral PPAs have no central counterparty. The bilateral market is a *venue* with standardized DAM LMP settlement references, not a CCP.
- `customers → lses` — retail bills flow direct under PUC-set retail tariffs. The retail tariff determines amounts (`retail → customers` information), but the cash flow is counterparty-to-counterparty.
- `generators → to` — network upgrade construction payments are direct contracts under interconnection cost allocation. The ISO administers the *process* (interconnection studies, queue position) but not the *money*.

The asymmetry is structural and intentional: centrally-cleared = ISO is the financial counterparty; bilateral/retail/direct = no central counterparty. Whether the bilateral layer should also clear through a CCP (as in some European markets) is an open design question.
"""

[dam-runs]
name = "How the DAM runs"
default_edge_types = ["action", "information", "money"]
layout = "concentric"
focus = "dam"
narrative = """
The DAM is the day-ahead energy market — it produces hourly LMPs and cleared schedules that serve as the financial baseline for nearly everything downstream. This view walks through the sequence: how participants bid, how the market clears, what happens during the operating day, and how settlement closes the loop.

**1. Bidding (day-ahead, before ~11am).** Three participant types submit positions:

- **Generators** submit supply offers — energy curves, start-up and minimum-run constraints (`generators → dam` action). Defines the supply side of SCUC.
- **LSEs** submit demand bids — price-sensitive or self-scheduled load (`lses → dam` action). Procures next-day energy on behalf of retail load.
- **Traders** submit financial increments and decrements — virtual bids that arbitrage the DAM–RTM seam (`traders → dam` action).

**2. Clearing (day-ahead, ~1-4pm).** The ISO supplies the clearing engine with everything needed to optimize: the network model, the binding constraint set, loss factors, and the contingency list (`iso → dam` information). SCUC (security-constrained unit commitment) co-optimizes energy with ancillary services and produces hourly LMPs and cleared MW positions per node.

**3. Outputs.** Clearing results flow back to the ISO for settlement and downstream coordination (`dam → iso` information): LMPs, cleared positions, congestion shadow prices, commitment schedules. DAM positions become the financial baseline that RTM settles against (`dam → rtm` information). DAM congestion drives FTR payouts (`dam → ftr` information).

**4. Operating day.** Generators follow real-time dispatch (`generators → rtm` action) within the schedule DAM committed. The RTM clears 5-minute imbalances against DAM positions — but importantly, *RTM does not transfer money to DAM*. They're two parallel settlement runs administered by the ISO. The DAM commits the schedule and locks in financial positions at DAM LMPs; the RTM settles the deviations at RTM LMPs.

**5. Settlement (D+1 to D+several).** Money flows through the cleared-market chain:

- `lses → dam → iso → generators` (money) — LSEs pay DAM at LMP_load × cleared MW; the DAM aggregates settlement at the ISO; the ISO pays generators at LMP_gen × cleared MW.
- `traders → dam` and `dam → iso → traders` (money) — virtual settlements clear in the same chain. Traders with net-negative positions owe; net-positive positions receive.
- Generators with storage/hybrid charging are net-negative on those hours — they pay into the DAM rather than receive (`generators → dam` money).

The residual at congested nodes — `(LMP_load − LMP_gen) × flow` — is the **congestion rent** the ISO collects. This rent is what funds FTR settlement (visible in this view as `ftr → iso` money: FTR aggregate settlement includes the congestion-rent inflow that pays FTR holders).

**Why this matters.** The DAM is both a price-discovery mechanism AND the principal financial commitment. Generators commit physical resources at DAM clearing time and earn revenue at DAM LMPs; LSEs lock in their next-day cost exposure at the same prices. Almost everything downstream references DAM outputs: bilateral PPAs settle against DAM LMPs (`dam → bilateral` information), FTR settlements use DAM congestion (`dam → ftr` information), and ARR allocation uses historical DAM/RTM patterns. The DAM is the keystone of the cleared wholesale system.
"""

[lse-pays]
name = "How an LSE's bill is built"
default_edge_types = ["money", "action", "information"]
layout = "fcose"
focus = "lses"
narrative = """
The LSE sits between two regulated price domains: retail tariffs (sticky, PUC-approved, customer-facing) and wholesale procurement (volatile, ISO-cleared or bilateral). Its job is to convert a stable retail revenue stream into the actual wholesale purchases that serve load. Every component of an LSE's bill traces to that conversion.

**1. Energy procurement.** The LSE buys energy three ways. Long-dated **bilateral PPAs** — often RPS-compliant — flow `lses → bilateral → generators` (money), with the contract price referenced to DAM LMPs (`dam → bilateral` information) and willingness-to-pay shaped by capacity-market revenues (`capacity → bilateral` information — the missing-money signal). Day-ahead and real-time clearing run through the ISO: the LSE pays `lses → dam → iso` (money) for cleared DAM energy at hourly LMPs, and `lses → rtm → iso` (money) for imbalance at 5-min LMPs. The ISO pays generators out the other side (`iso → generators` money). The DAM-RTM seam is the source of the LSE's largest cost volatility.

**2. Capacity.** Where a capacity market exists (PJM RPM, ISO-NE FCM, NYISO ICAP, MISO PRA), LSEs pay capacity charges via `lses → capacity → iso → generators` (money chain). Charge × clearing price × load-share of system peak. Capacity revenues also shape bilateral PPA pricing through `capacity → bilateral` (information).

**3. Transmission service.** The largest cross-ISO variation lives here. The transmission revenue requirement is recovered through OATT charges allocated to LSEs based on their load *coincident with system peaks*:

- ERCOT uses **4CP** — average load during the four highest summer system peaks (June–September), one per month.
- PJM uses **5CP** — the five highest system peaks across the year.
- NYISO and ISO-NE use variants of network service peak load (NSPL) and peak load contribution (PLC).

The money path is direct: `lses → iso → to` (money). The ISO collects the OATT uplift from LSEs (along with gen- and trader-side OATT shares) and remits to TOs as cost-of-service compensation. The `oatt` node itself doesn't sit in the cash path — it's the *tariff schedule* that determines amounts (`oatt → iso` information). The allocation method (4CP vs. 5CP vs. NSPL) is what sharpens the incentive to curtail during expected peaks (the famous "4CP economics" in ERCOT).

**4. Congestion offset (ARR/FTR).** LSEs are partially compensated for the cost of congestion that's locked into their load patterns. Each LSE nominates ARRs (`lses → arr` action) based on its qualifying load history. The funding mechanism: the ISO collects FTR auction revenue (`ftr → iso` money, the auction-buys aggregate), runs the ARR allocation formula, and distributes cash to LSEs (`iso → lses` money). LSEs may also self-convert ARRs into FTRs (`lses → ftr` action) when they want a position-based hedge rather than cash — those FTRs settle through the ISO as well. The `arr` node is the formula; the money flows through the ISO.

**5. Retail passthrough.** The net wholesale obligation — energy + capacity + transmission + ARR credit + ancillaries — passes through to retail customers via PUC-approved tariffs (`retail → customers` information). Cash flows direct: `customers → lses` (money), with the retail tariff determining the amount. Retail tariffs are sticky, so any uncovered volatility lands on the LSE's balance sheet or is recovered through deferred-cost mechanisms.

**What this view leaves out.** Regulation edges (FERC, PUC, NERC, legislature) are hidden — they govern the rules but don't appear in the cost arithmetic. Ancillary services (AS) are folded into the energy/uplift narrative for clarity. The action edges from generators or traders into wholesale markets are not in scope; the view is the LSE's side of the ledger.

**Where the contested questions live.** Capacity-bilateral interactions (`capacity → bilateral`) carry the missing-money debate. The OATT allocation method is the levered policy choice for transmission cost — and an increasing share of LSEs' bills as transmission expands. ARR adequacy (whether FTR auction revenue actually funds the nominated ARRs) determines whether the congestion offset is real or notional.
"""
