# Views: curated subgraphs with narrative.
#
# Each [view-id] table defines one view. Membership is determined by the
# `views` column on nodes.csv and (for strict views) edges.csv. Fields
# below carry view metadata.

[dam-runs]
name = "How the DAM runs"
default_edge_types = ["action", "information", "money"]
layout = "concentric"
focus = "dam"
narrative = """
The DAM is the day-ahead energy market — it produces hourly LMPs, unit commitments, and cleared positions that drive the next day of operations and the financial baseline for nearly everything downstream. This view walks the sequence: bidding → clearing → outputs → operating day → settlement.

**1. Bidding (day-ahead, before ~11am).** Three participant types submit positions:

- **Generators** submit supply offers — energy curves, start-up and minimum-run constraints (`generators → dam` action). Storage and hybrid resources may be net buyers when scheduling charging.
- **Generators also offer AS** capability simultaneously — regulation, spinning, non-spin, ramping (`generators → as` action). AS is co-optimized with energy in the same clearing engine.
- **LSEs** submit demand bids — price-sensitive or self-scheduled load (`lses → dam` action).
- **Traders** submit financial increments and decrements — virtual bids that arbitrage the DAM–RTM seam (`traders → dam` action).

**2. Clearing (day-ahead, ~1-4pm).** The ISO supplies the clearing engine with the network model, binding constraint set, loss factors, and contingency list (`iso → dam` information). SCUC (security-constrained unit commitment) co-optimizes energy with ancillary services — `dam → as` (information) captures this — and produces hourly LMPs, cleared MW positions per node, and a unit commitment schedule.

**3. Outputs.** Clearing results flow back to the ISO for settlement (`dam → iso` information). Downstream consumers of DAM outputs:

- The **unit commitment** flows to RTM (`dam → rtm` information) — RTM dispatches within this envelope.
- **DAM congestion** drives FTR settlement (`dam → ftr` information) — congestion rent funds FTR holder payouts.
- **DAM LMPs** are the standard reference for bilateral PPA settlement (`dam → bilateral` information).

**4. Operating day.** Generators follow real-time dispatch (`generators → rtm` action) within the DAM-committed envelope. RTM (SCED) optimizes 5-min dispatch and produces RTM LMPs.

**5. Settlement.** Cash flows through the ISO as central counterparty: `lses/generators/traders → iso` (money) bundles each actor's DAM share with their other cleared-market positions; `iso → generators/lses/traders` (money) bundles the corresponding payouts. The DAM-specific component lives in `dam → iso` (information): cleared LMPs and positions are the data the ISO uses to compute the DAM portion of net settlement.

The residual at congested nodes — `(LMP_load − LMP_gen) × flow` — is the **congestion rent**. The ISO holds this from DAM clearing and routes it to FTR settlement.

**Why this matters.** The DAM is both a price-discovery mechanism AND the principal commitment market. Generators commit physical resources at DAM clearing time and earn revenue at DAM LMPs; LSEs lock in next-day cost exposure at the same prices. Bilateral PPAs reference DAM LMPs, FTR settlements use DAM congestion, and ARR allocation uses historical DAM/RTM patterns. The DAM is the keystone of the cleared wholesale system.
"""

[rtm-runs]
name = "How the RTM runs"
default_edge_types = ["action", "information", "money"]
layout = "concentric"
focus = "rtm"
narrative = """
The RTM is the real-time energy market — it dispatches the actual MW that flows on the grid, in 5-minute intervals, within the unit commitment envelope set by DAM. RTM produces real-time LMPs and settles deviations from DAM positions.

**1. Inputs.** RTM dispatch is bound by two things:

- **DAM unit commitment** (`dam → rtm` information) — which generators are committed, at what minimum/maximum, and on what ramp schedules. RTM cannot generally re-commit units in real time; it dispatches within the DAM-committed envelope.
- **ISO state estimation and network model** (`iso → rtm` information) — real-time grid state, contingency list, telemetry-driven.

**2. Clearing.** SCED (security-constrained economic dispatch) runs every 5 minutes. It optimizes generator output within the committed envelope to meet load, manage flows, and co-optimize with AS deployment (`rtm → as` information: real-time AS deployment is decided alongside energy).

**3. Actions during the operating day:**

- **Generators** follow dispatch instructions issued by the ISO (`generators → rtm` action, `iso → generators` information for dispatch signals).
- **Generators offer AS in real time** alongside energy (`generators → as` action).
- **LSEs** can self-schedule load and operate DR programs and wholesale-passthrough retail products — paid for curtailment when load drops below DAM-cleared position (`lses → rtm` action).

**4. Outputs.** 5-min LMPs and dispatch quantities flow back to the ISO (`rtm → iso` information) for settlement and downstream operational coordination.

**5. Settlement.** Money flows through the ISO as central counterparty. The RTM-specific component is bundled into the same aggregate edges as DAM: `lses/generators → iso` (money) and `iso → generators/lses` (money) carry net positions across all cleared markets. RTM-specific signals:

- LSEs whose actual load exceeded their DAM-cleared position pay imbalance × RTM LMP into `lses → iso` (money).
- LSEs paid for curtailment (DR) receive credits via `iso → lses` (money).
- Generators dispatched above their DAM-cleared position receive imbalance revenue via `iso → generators` (money).

**The key structural fact.** RTM does not "settle against" DAM in any cash sense — they're separate settlement runs the ISO sums. DAM commits and prices the day-ahead schedule; RTM dispatches and prices real-time deviations. The seam between them is what virtual bidders arbitrage in DAM (`traders → dam` action, hidden in this view but conceptually present).

**Scarcity pricing and ORDC.** In ISOs with scarcity pricing or operating-reserve-demand-curves (e.g., ERCOT's ORDC), RTM LMPs can spike well above DAM LMPs during shortage events. This is where most of a generator's lifetime revenue can come from in energy-only markets.
"""

[ftr-runs]
name = "How the FTR auction runs"
default_edge_types = ["action", "information", "money"]
layout = "concentric"
focus = "ftr"
narrative = """
The FTR auction allocates rights to collect congestion rents from cleared DAM congestion. ARR (Auction Revenue Rights) is the formula that distributes the FTR auction's revenue to LSEs based on historical load and transmission-cost responsibility. Together they form the wholesale congestion hedging layer.

**1. ARR nomination.** LSEs nominate ARRs based on their qualifying load patterns (`lses → arr` action). Nominations are vetted against the simultaneous feasibility constraints — the same network model that constrains FTR clearing.

**2. The ARR formula.** Three inputs drive the allocation:

- **Historical RTM load** by LSE and node (`rtm → arr` information).
- **OATT transmission cost allocation** — load-share of transmission cost responsibility, often coincident with system peaks (`oatt → arr` information).
- **FTR auction revenue** — the funding source the formula distributes (`ftr → arr` information).

The formula produces ARR awards by LSE and path, which flow to the ISO for administration (`arr → iso` information).

**3. FTR auction.** The ISO supplies the network model and feasibility region (`iso → ftr` information). Traders bid path-based congestion positions (`traders → ftr` action); LSEs may bid directly or self-convert their ARRs into FTRs (`lses → ftr` action). The auction clears via simultaneous feasibility test (SFT) — the cleared set must be deliverable on the network model. Auction results flow back to the ISO (`ftr → iso` information).

**4. Funding source.** DAM congestion produces congestion rent — the residual between LMP_load and LMP_gen at congested constraints (`dam → ftr` information). The ISO collects this rent from DAM clearings and routes it to FTR settlement.

**5. Settlement.** Money flows through the ISO as central counterparty:

- **FTR buys**: `traders → iso` and `lses → iso` (money) carry auction-buy payments along with each actor's other cleared-market obligations.
- **FTR settlements**: `iso → traders` (money) pays out congestion settlements to FTR holders. `iso → lses` (money) pays out ARR cash distributions and FTR settlements on LSE-held FTRs.
- **Net auction revenue funds ARRs**: the chain is mechanically `ftr → arr` (information) → ISO administers the ARR formula → `iso → lses` (money) for distributions.

**Revenue adequacy.** When realized DAM congestion rent falls short of cleared FTR awards, the auction is revenue-inadequate. Shortfall is uplifted to participants (bundled into `lses → iso` and `traders → iso` money edges as revenue-inadequacy assessments). Revenue adequacy is a contested research and design question — it depends heavily on the network model used for SFT clearing.

**Self-conversion.** LSEs can choose to take ARR cash OR self-convert ARRs into FTRs they hold. Self-conversion gives the LSE a position-based hedge (paying when congestion goes their way, owing when it doesn't) rather than a cash payment. The choice is part of the LSE's hedge strategy.
"""

[capacity-runs]
name = "How the capacity market runs"
default_edge_types = ["action", "information", "money"]
layout = "concentric"
focus = "capacity"
narrative = """
The capacity market is the wholesale system's mechanism for procuring forward generation capacity — committing resources years ahead to ensure adequate supply during peak periods. It exists because energy markets alone may not provide enough revenue to support new investment (the "missing money" problem). PJM RPM, ISO-NE FCM, NYISO ICAP, and MISO PRA are the four canonical capacity markets; ERCOT and CAISO use alternative mechanisms.

**1. Accreditation.** Not every nameplate MW counts the same. The ISO determines each resource's *accredited capacity* — its effective contribution to reliability — via methodologies like ELCC (effective load carrying capability), particularly for variable resources like wind and solar (`iso → capacity` information). Accreditation choices are increasingly the contested ground in capacity market design.

**2. Auction.** Generators offer accredited capacity into the auction (`generators → capacity` action). LSEs' obligation is set administratively based on their load-share of system peak forecast (so LSEs don't directly bid in most designs — their charge is determined by the formula).

Auctions clear at a system-wide (or zonal) clearing price using a sloped demand curve (the **VRR** — variable resource requirement — in PJM; analogous demand curves elsewhere). Demand curves are FERC-approved and are themselves often contested.

**3. Outputs.** Auction results flow back to the ISO (`capacity → iso` information): cleared prices, cleared positions per zone, locational constraint outcomes. The cleared accredited MW is what gens are committed to deliver during shortage events (must-offer obligation back into DAM).

**4. Settlement.** Money flows through the ISO as central counterparty:

- **LSEs pay capacity charges** via `lses → iso` (money) — the capacity component is one of several items bundled in that edge, sized by load-share × clearing price.
- **Generators receive capacity revenue** via `iso → generators` (money) — accredited MW × clearing price.
- **Capacity penalties** for non-performance during shortage events flow `generators → iso` (money).

**5. State-policy signals.** Capacity market design is contested at the state/federal seam because what states want (clean-resource targets, subsidies for in-state resources, retail-side procurement preferences) and what FERC-regulated capacity markets do (clear at a system-wide price, neutral across resource types) are often in tension. Two information edges carry the signal:

- `legislature → capacity` (information): state RPS targets, decarbonization mandates, and clean-resource statutes drive accreditation reforms — ELCC methodology for variable resources, carve-outs, clean-capacity considerations.
- `puc → capacity` (information): PUC actions — IRP outcomes, OOM (out-of-market) payments, state subsidies, retail-side resource preferences — create the operational pressure that surfaces in MOPR fights. State-subsidized resources offering at their actual marginal cost vs. an administrative floor is the canonical version of this debate.

These are *information* edges, not regulation: state governments don't directly regulate FERC-jurisdictional capacity markets. They send signals that capacity-market designers (FERC, the ISO) have to respond to.

**6. Bilateral interaction — the missing-money story.** Capacity revenue is one of the principal drivers of bilateral PPA willingness-to-pay (`capacity → bilateral` information). When capacity prices are high, LSEs can pay more for capacity-inclusive PPAs; when capacity prices are low or absent (energy-only markets), the bilateral layer has to price in the missing capacity revenue itself. This is the structural seam between organized capacity markets and the bilateral hedge layer.

**7. Multi-year structure.** Most capacity auctions clear 3 years forward. This forward horizon is meant to give new-build economics time to develop and finance, but it also creates risk for both buyers (LSE costs locked in years ahead) and sellers (gens commit to deliver well before the operating period).

**The contested questions:**

- **Accreditation methodology** — how to value intermittent resources (ELCC parameters), storage duration, demand response counted against capacity.
- **MOPR (Minimum Offer Price Rule)** — whether state-subsidized resources can offer at their actual marginal cost or must offer at an administrative floor.
- **Demand curve parameters** — system-cost-of-new-entry (CONE), demand curve slope, performance assessment intervals.
- **Whether to have a capacity market at all** — ERCOT's energy-only model is the alternative, with scarcity pricing instead of forward capacity payments.
"""

[load-bill]
name = "A large flexible load's bill"
default_edge_types = ["money", "information", "action"]
layout = "fcose"
focus = "largeload"
narrative = """
A load's electricity bill is the sum of charges for the different ways its consumption uses the grid. This view groups those charges into three layers and shows what sets each one.

**Energy.** The cost of the power itself, priced at the location's market price (the LMP). Set by market clearing (`dam → iso`, `rtm → iso`) and collected through the load's settlement (`largeload → iso`). A load lowers this by using less when the price is high.

**Reserves.** The cost of holding spare capacity to keep the system balanced. Part is built into the energy price; the rest is an uplift charge split across load (`as → iso`) that curtailing does not reduce. A load that can drop quickly could instead sell that ability as a reserve (`largeload → as`), though most markets do not yet allow this.

**Capacity and transmission.** The cost of building enough generation and wires for peak demand, recovered as a capacity charge (`capacity → iso`) and a transmission charge (`oatt → iso`), both sized by the load's demand at peak. A load reduces these only by lowering its peak.

**How the connection type changes the bill.** The same charges reach a load differently depending on how it connects:

- **Through an LSE (bundled).** The load pays one blended rate (`largeload → lses`; `retail → largeload` sets it). The LSE faces the wholesale market for it (`lses → iso`), so the layers are averaged together and hidden.
- **At the transmission level (direct).** The load settles each layer with the ISO itself (`largeload → iso`) and can hold its own congestion rights (`largeload → arr`) and interconnection obligations (`largeload → interconnection`).
- **Behind the meter.** On-site or colocated generation supplies part of the load (`largeload → bilateral`), so only the net draw reaches the grid.

**Reading the graph.** Red money edges are charges and credits; dashed information edges show what sets each amount; green action edges are choices the load can make. Turn on regulation edges to see the FERC or NERC rule behind each mechanism.
"""
