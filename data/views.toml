# Views: curated subgraphs with narrative.
#
# Each [view-id] table defines one view. The members of the view are determined
# by the `views` column on nodes.csv (and optionally edges.csv). The fields
# below carry the view's metadata.

[iso-clearing]
name = "The ISO as central counterparty"
default_edge_types = ["money"]
layout = "concentric"
focus = "iso"
narrative = """
The ISO is the **central counterparty** for every centrally-cleared wholesale transaction. Buyers pay the market; the market aggregates settlement at the ISO; the ISO pays sellers. This view shows the clearing-house pattern — money flowing into the ISO from cleared markets and back out to participants — with bilateral and direct-payment flows visible as contrast.

**Inflows.** Three actor types pay the ISO:

- **`lses → iso`** — LSEs pay the largest amounts: DAM cleared energy at LMP_load, RTM imbalance, AS uplift, capacity charges (load-share of system peak), FTR auction buys, and OATT/transmission-service uplift.
- **`generators → iso`** — Generators pay for storage/hybrid charging energy (DAM and RTM), capacity penalties for non-performance, interconnection study deposits, and other administered charges.
- **`traders → iso`** — Financial traders pay for FTR auction buys, net-negative virtual settlements, and any revenue-inadequacy uplift.

**Outflows.** Four destinations from the ISO:

- **`iso → generators`** — energy clearing (DAM/RTM), AS awards, capacity revenues, paid out from cleared-market collections.
- **`iso → lses`** — ARR cash distributions (per the ARR formula run on FTR auction revenue), FTR settlements on LSE-held FTRs, RTM credits for DR/curtailment.
- **`iso → traders`** — FTR congestion settlements and net-positive virtual settlement revenues.
- **`iso → to`** — OATT/TRR remittance to TOs as cost-of-service compensation.

**Why the markets aren't in the money path.** The DAM, RTM, AS, capacity, and FTR nodes are price-determination mechanisms — they clear bids and produce LMPs and quantities. The cash settlement of those clearings runs through the ISO as the legal counterparty. The markets' role is captured by `iso → dam` (information: network model in), `dam → iso` (information: clearing outputs back for settlement), and the actor-side action edges (`generators → dam`, `lses → dam`, etc.). Money paths are symmetric: an actor pays the ISO across all cleared markets via a single aggregate edge, and the ISO pays back across all cleared markets via a single aggregate edge.

**The balance identity.** Per settlement run, *sum(inflows) = sum(outflows) + reserves*. The ISO doesn't retain profits; it administers. The classic mechanical chain: LSEs pay `LMP_load × MW`, the ISO collects, and pays generators `LMP_gen × MW`. The residual — `(LMP_load − LMP_gen) × flow` summed across congested constraints — is congestion rent, which funds FTR settlement. Revenue inadequacy occurs when congestion rent collected doesn't fully fund cleared FTRs (uplifted via `lses → iso` revenue-inadequacy assessments).

**What doesn't flow through the ISO.** Three categories of money edges bypass the central-counterparty pattern:

- `lses → bilateral → generators` (and `customers → bilateral → generators`) — bilateral PPAs have no central counterparty. The bilateral market IS the venue, so money flows through the bilateral node directly.
- `customers → lses` — retail bills flow direct under PUC-set retail tariffs (`retail → customers` information determines the amount).
- `generators → to` — network upgrade construction payments are direct contracts under interconnection cost allocation. The ISO administers the *process* but not the *money*.

The asymmetry is structural: centrally-cleared = ISO is counterparty; bilateral/retail/direct construction = no central counterparty. Whether the bilateral layer should also clear through a CCP (as in some European markets) is an open design question.
"""

[dam-runs]
name = "How the DAM runs"
default_edge_types = ["action", "information", "money"]
layout = "concentric"
focus = "dam"
narrative = """
The DAM is the day-ahead energy market — it produces hourly LMPs and cleared schedules that serve as the financial baseline for nearly everything downstream. This view walks through the sequence: how participants bid, how the market clears, what happens during the operating day, and how settlement closes the loop.

**1. Bidding (day-ahead, before ~11am).** Three participant types submit positions:

- **Generators** submit supply offers — energy curves, start-up and minimum-run constraints (`generators → dam` action). Defines the supply side of SCUC.
- **LSEs** submit demand bids — price-sensitive or self-scheduled load (`lses → dam` action). Procures next-day energy on behalf of retail load.
- **Traders** submit financial increments and decrements — virtual bids that arbitrage the DAM–RTM seam (`traders → dam` action).

**2. Clearing (day-ahead, ~1-4pm).** The ISO supplies the clearing engine with everything needed to optimize: the network model, the binding constraint set, loss factors, and the contingency list (`iso → dam` information). SCUC (security-constrained unit commitment) co-optimizes energy with ancillary services and produces hourly LMPs and cleared MW positions per node.

**3. Outputs.** Clearing results flow back to the ISO for settlement and downstream coordination (`dam → iso` information): LMPs, cleared positions, congestion shadow prices, commitment schedules. The **unit commitment** — which generators are on, at what minimum/maximum, and on what ramp schedules — flows from DAM to RTM (`dam → rtm` information). RTM dispatch is bound by this commitment; it cannot re-commit units in real time. DAM congestion drives FTR payouts (`dam → ftr` information).

**4. Operating day.** Generators follow real-time dispatch (`generators → rtm` action) within the unit commitment DAM produced. RTM (SCED) optimizes 5-min dispatch within that committed envelope and produces RTM LMPs. DAM and RTM are *separate* settlement runs — RTM doesn't transfer money to DAM, and RTM doesn't "settle against" DAM in any cash sense. The ISO sums per-actor DAM and RTM positions at the end of the period: DAM-cleared MWh × DAM LMP plus RTM dispatch deviations × RTM LMP, into a single net invoice.

**5. Settlement (D+1 to D+several).** Cash settlement runs through the ISO as legal counterparty. The DAM-cleared component flows into `lses → iso`, `generators → iso`, and `traders → iso` (money — for LSEs paying for cleared energy, generators with charging-energy positions, and traders with net-negative virtuals). On the outflow side, `iso → generators` (energy revenues), `iso → lses` (RTM DR credits), and `iso → traders` (positive virtuals) pay out.

The DAM node itself doesn't carry money — it's the price-determination venue. The cash settlement of DAM clearings is aggregated by the ISO across all cleared markets (DAM, RTM, AS, capacity, FTR) into single per-actor settlement runs. The DAM-specific signal lives in `dam → iso` (information: cleared LMPs and positions that drive settlement amounts).

The residual at congested nodes — `(LMP_load − LMP_gen) × flow` — is the **congestion rent** the ISO collects from DAM clearings. This rent is what funds FTR settlement; the chain is implicit in the `iso → traders` (money) and `iso → lses` (money) outflows, which include FTR settlements paid from congestion-rent pool.

**Why this matters.** The DAM is both a price-discovery mechanism AND the principal financial commitment. Generators commit physical resources at DAM clearing time and earn revenue at DAM LMPs; LSEs lock in their next-day cost exposure at the same prices. Almost everything downstream references DAM outputs: bilateral PPAs settle against DAM LMPs (`dam → bilateral` information), FTR settlements use DAM congestion (`dam → ftr` information), and ARR allocation uses historical DAM/RTM patterns. The DAM is the keystone of the cleared wholesale system.
"""

[lse-pays]
name = "How an LSE's bill is built"
default_edge_types = ["money", "action", "information"]
layout = "fcose"
focus = "lses"
narrative = """
The LSE sits between two regulated price domains: retail tariffs (sticky, PUC-approved, customer-facing) and wholesale procurement (volatile, ISO-cleared or bilateral). Its job is to convert a stable retail revenue stream into the actual wholesale purchases that serve load. Every component of an LSE's bill traces to that conversion.

All of the LSE's wholesale obligations — energy, capacity, ancillaries, transmission, FTR auction buys, and any uplift assessments — flow through a single channel: `lses → iso` (money). The ISO is the legal counterparty for everything centrally-cleared and for tariff administration. Bilateral PPAs and retail bills are the exceptions; they flow direct.

**1. Energy procurement.** The LSE buys energy three ways. Long-dated **bilateral PPAs** — often RPS-compliant — flow `lses → bilateral → generators` (money). Bilateral has no central counterparty; the bilateral node IS the conceptual venue. The contract price is referenced to DAM LMPs (`dam → bilateral` information) and willingness-to-pay is shaped by capacity-market revenues (`capacity → bilateral` information — the missing-money signal). **Day-ahead and real-time** clearing happen at the markets but settle through the ISO: the LSE submits bids (`lses → dam` action, `lses → rtm` action), the markets clear, and the cash settlement runs `lses → iso → generators` (money). The DAM and RTM nodes don't carry money in this model — they're the price-determining venues, with `dam → iso` (information) carrying the clearing outputs that drive settlement.

**2. Capacity.** Where a capacity market exists (PJM RPM, ISO-NE FCM, NYISO ICAP, MISO PRA), LSEs owe a capacity charge based on load-share of system peak. The bid/clearing happens at capacity (`generators → capacity` action, `iso → capacity` regulation), but the money settles through ISO: the capacity component flows into `lses → iso` (money) and out via `iso → generators` (money). Capacity revenues also shape bilateral PPA pricing through `capacity → bilateral` (information).

**3. Transmission service.** The largest cross-ISO variation lives here. The transmission revenue requirement is recovered through OATT charges allocated to LSEs based on their load *coincident with system peaks*:

- ERCOT uses **4CP** — average load during the four highest summer system peaks (June–September), one per month.
- PJM uses **5CP** — the five highest system peaks across the year.
- NYISO and ISO-NE use variants of network service peak load (NSPL) and peak load contribution (PLC).

The money path: `lses → iso → to` (money). The OATT tariff (`oatt` node) sets the amount via `oatt → iso` (information); the cash flows through the ISO as administrator. The allocation method (4CP vs. 5CP vs. NSPL) is what sharpens the incentive to curtail during expected peaks (the famous "4CP economics" in ERCOT).

**4. Congestion offset (ARR/FTR).** LSEs are partially compensated for the cost of congestion locked into their load patterns. Each LSE nominates ARRs (`lses → arr` action) based on its qualifying load history. The FTR auction collects revenue from bidders (covered by `traders → iso` and `lses → iso` money for their FTR buys); the ISO runs the ARR formula; cash flows out to LSEs via `iso → lses` (money). The `arr` and `ftr` nodes themselves don't carry money — they're the formula and the auction mechanism — with `ftr → arr` (information) showing that FTR auction revenue is the funding source.

**5. Retail passthrough.** The net wholesale obligation — energy + capacity + transmission + ARR credit + ancillaries — passes through to retail customers via PUC-approved tariffs (`retail → customers` information). Cash flows direct: `customers → lses` (money), with the retail tariff determining the amount. Retail tariffs are sticky, so any uncovered volatility lands on the LSE's balance sheet or is recovered through deferred-cost mechanisms.

**What this view leaves out.** Regulation edges (FERC, PUC, NERC, legislature) are hidden — they govern the rules but don't appear in the cost arithmetic. Ancillary services (AS) are folded into the energy/uplift narrative for clarity. The action edges from generators or traders into wholesale markets are not in scope; the view is the LSE's side of the ledger.

**Where the contested questions live.** Capacity-bilateral interactions (`capacity → bilateral`) carry the missing-money debate. The OATT allocation method is the levered policy choice for transmission cost — and an increasing share of LSEs' bills as transmission expands. ARR adequacy (whether FTR auction revenue actually funds the nominated ARRs) determines whether the congestion offset is real or notional.
"""
