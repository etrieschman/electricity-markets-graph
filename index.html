<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electricity Markets — Framework Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base/layout-base.js"></script>
<script src="https://unpkg.com/cose-base/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
:root {
  --bg: #f5f2ea;
  --bg-panel: #ebe5d5;
  --ink: #1a1814;
  --ink-soft: #5c574b;
  --rule: #2a2620;
  --accent: #8a3324;
  --actor: #1f3a5f;
  --market: #5a4a2a;
  --regulator: #1f3a5f;
  --operator: #3a6680;
  --participant: #4a7a5a;
  --mech-market: #8a4a2a;
  --tariff: #6a5a3a;
  --process: #a07a3a;
  --action: #2e5f3e;
  --money: #8a3324;
  --regulation: #4a3a6a;
  --information: #7a6a3a;
  --shadow: 0 1px 2px rgba(0,0,0,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter Tight', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  height: 100vh;
  display: grid;
  grid-template-columns: 320px 1fr 360px;
  grid-template-rows: 56px 1fr;
  overflow: hidden;
}

header {
  grid-column: 1 / -1;
  border-bottom: 1px solid var(--rule);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  z-index: 10;
}

header h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 19px;
  letter-spacing: -0.01em;
  font-variation-settings: "opsz" 30;
}

header h1 em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}

header .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

aside.left, aside.right {
  background: var(--bg-panel);
  overflow-y: auto;
  padding: 20px;
}

aside.left { border-right: 1px solid var(--rule); }
aside.right { border-left: 1px solid var(--rule); }

.section {
  margin-bottom: 24px;
}

.section h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}

.section h2 .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-soft);
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  float: right;
  margin-top: 2px;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.filter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.1s;
  font-size: 13px;
}

.filter-row:hover { background: rgba(0,0,0,0.04); }

.filter-row input[type="checkbox"] {
  margin: 0;
  accent-color: var(--ink);
}

/* Subcategory checkboxes are styled to BE the color-key — colored circle
   for actors, colored square for mechanisms. Filled when checked, outline
   only when unchecked. */
.filter-row input[data-subcat] {
  appearance: none;
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border: 1.5px solid;
  cursor: pointer;
  background: transparent;
  transition: background 0.1s;
  position: relative;
}

.filter-row input[data-subcat="regulator"],
.filter-row input[data-subcat="operator"],
.filter-row input[data-subcat="participant"] { border-radius: 50%; }

.filter-row input[data-subcat="market"],
.filter-row input[data-subcat="tariff"],
.filter-row input[data-subcat="process"] { border-radius: 2px; }

.filter-row input[data-subcat="regulator"] { border-color: var(--regulator); }
.filter-row input[data-subcat="regulator"]:checked { background: var(--regulator); }
.filter-row input[data-subcat="operator"] { border-color: var(--operator); }
.filter-row input[data-subcat="operator"]:checked { background: var(--operator); }
.filter-row input[data-subcat="participant"] { border-color: var(--participant); }
.filter-row input[data-subcat="participant"]:checked { background: var(--participant); }
.filter-row input[data-subcat="market"] { border-color: var(--mech-market); }
.filter-row input[data-subcat="market"]:checked { background: var(--mech-market); }
.filter-row input[data-subcat="tariff"] { border-color: var(--tariff); }
.filter-row input[data-subcat="tariff"]:checked { background: var(--tariff); }
.filter-row input[data-subcat="process"] { border-color: var(--process); }
.filter-row input[data-subcat="process"]:checked { background: var(--process); }

.swatch {
  width: 18px;
  height: 3px;
  flex-shrink: 0;
}

.swatch.action { background: var(--action); }
.swatch.money { background: var(--money); }
.swatch.regulation { background: var(--regulation); }
.swatch.information { background: var(--information); border-top: 1px dashed var(--information); height: 0; border-bottom: 0; }

.filter-row .count {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-soft);
}

.layout-select {
  display: flex;
  gap: 0;
  border: 1px solid var(--rule);
}

.layout-select button {
  flex: 1;
  background: transparent;
  border: none;
  padding: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--ink-soft);
  border-right: 1px solid var(--rule);
  transition: all 0.1s;
}

.layout-select button:last-child { border-right: none; }

.layout-select button:hover { background: rgba(0,0,0,0.04); }

.layout-select button.active {
  background: var(--ink);
  color: var(--bg);
}

.view-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.view-btn {
  text-align: left;
  background: transparent;
  border: 1px solid var(--rule);
  padding: 8px 10px;
  font-family: 'Inter Tight', sans-serif;
  font-size: 12px;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.1s;
  line-height: 1.3;
}

.view-btn:hover { background: rgba(0,0,0,0.04); }

.view-btn.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

.view-btn-name {
  font-size: 12px;
  font-weight: 500;
}

.view-btn-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-soft);
  margin-top: 2px;
}

.view-btn.active .view-btn-meta {
  color: rgba(245, 242, 234, 0.7);
}

.view-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}

.view-toggle {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink-soft);
  padding: 0 4px;
  transition: transform 0.15s;
}

#view-section.collapsed .view-toggle {
  transform: rotate(-90deg);
}

#view-section.collapsed .view-narrative {
  display: none;
}

.view-narrative {
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
}

.view-narrative p { margin-bottom: 12px; }
.view-narrative p:last-child { margin-bottom: 0; }
.view-narrative strong { font-weight: 600; }
.view-narrative em { font-style: italic; }
.view-narrative code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  background: rgba(0,0,0,0.05);
  padding: 1px 4px;
  border-radius: 2px;
}
.view-narrative ul {
  margin: 0 0 12px 18px;
  padding: 0;
}
.view-narrative li {
  margin-bottom: 4px;
  list-style: disc;
}

.search-box {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--rule);
  background: var(--bg);
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  color: var(--ink);
}

.search-box:focus {
  outline: none;
  border-color: var(--accent);
}

#cy {
  background: var(--bg);
  position: relative;
}

.legend-node {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  padding: 4px 0;
}

.legend-node .dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-node .dot.actor { background: var(--actor); }
.legend-node .dot.market { background: var(--market); border-radius: 2px; }
.legend-node .dot.regulator { background: var(--regulator); }
.legend-node .dot.operator { background: var(--operator); }
.legend-node .dot.participant { background: var(--participant); }
.legend-node .dot.mech-market { background: var(--mech-market); border-radius: 2px; }
.legend-node .dot.tariff { background: var(--tariff); border-radius: 2px; }
.legend-node .dot.process { background: var(--process); border-radius: 2px; }
.legend-group-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 8px;
  margin-bottom: 2px;
}
.legend-group-label:first-child { margin-top: 0; }

.detail-panel {
  font-size: 13px;
  line-height: 1.5;
}

.detail-panel .empty {
  color: var(--ink-soft);
  font-style: italic;
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 14px;
}

.detail-panel h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  font-variation-settings: "opsz" 30;
}

.detail-panel .category-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 14px;
}

.detail-panel .description {
  margin-bottom: 18px;
  color: var(--ink);
}

.detail-panel h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 16px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--rule);
}

.edge-item {
  padding: 8px 0;
  border-bottom: 1px solid rgba(42, 38, 32, 0.15);
}

.edge-item:last-child { border-bottom: none; }

.edge-item .edge-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  font-size: 12px;
}

.edge-item .type-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 5px;
  color: var(--bg);
}

.edge-item .type-tag.action { background: var(--action); }
.edge-item .type-tag.money { background: var(--money); }
.edge-item .type-tag.regulation { background: var(--regulation); }
.edge-item .type-tag.information { background: var(--information); }

.edge-item .other-node {
  font-weight: 500;
}

.edge-item .arrow {
  color: var(--ink-soft);
}

.edge-item .edge-desc {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.45;
}

footer {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  pointer-events: none;
}
</style>
</head>
<body>

<header>
  <h1>Electricity Market Structure </h1>
  <div class="meta">v0.1 · 20 nodes · 98 edges</div>
</header>

<aside class="left">
  <div class="section">
    <h2>Views</h2>
    <div class="view-list" id="view-list">
      <button class="view-btn active" data-view="">All</button>
      <!-- populated from GRAPH_DATA.views -->
    </div>
  </div>

  <div class="section">
    <h2>Layout</h2>
    <div class="layout-select">
      <button data-layout="fcose" class="active">Force</button>
      <button data-layout="concentric">Concentric</button>
      <button data-layout="circle">Circle</button>
    </div>
  </div>

  <div class="section">
    <h2>Search</h2>
    <input type="text" class="search-box" id="search" placeholder="Filter nodes...">
  </div>

  <div class="section">
    <h2>Edge Types</h2>
    <div class="filter-group" id="edge-filters">
      <label class="filter-row">
        <input type="checkbox" data-type="action" checked>
        <span class="swatch action"></span>
        <span>Action</span>
        <span class="count" id="count-action">0</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-type="money" checked>
        <span class="swatch money"></span>
        <span>Money</span>
        <span class="count" id="count-money">0</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-type="regulation">
        <span class="swatch regulation"></span>
        <span>Regulation</span>
        <span class="count" id="count-regulation">0</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-type="information" checked>
        <span class="swatch information"></span>
        <span>Information</span>
        <span class="count" id="count-information">0</span>
      </label>
    </div>
  </div>

  <div class="section">
    <h2>Node Types</h2>
    <div class="legend-group-label">Actor</div>
    <div class="filter-group" id="subcat-filters-actor">
      <label class="filter-row">
        <input type="checkbox" data-subcat="regulator" checked>
        <span>Regulator</span>
        <span class="count" id="count-regulator">0</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-subcat="operator" checked>
        <span>Operator</span>
        <span class="count" id="count-operator">0</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-subcat="participant" checked>
        <span>Participant</span>
        <span class="count" id="count-participant">0</span>
      </label>
    </div>
    <div class="legend-group-label">Mechanism</div>
    <div class="filter-group" id="subcat-filters-mechanism">
      <label class="filter-row">
        <input type="checkbox" data-subcat="market" checked>
        <span>Market</span>
        <span class="count" id="count-market">0</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-subcat="tariff" checked>
        <span>Tariff</span>
        <span class="count" id="count-tariff">0</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-subcat="process" checked>
        <span>Process</span>
        <span class="count" id="count-process">0</span>
      </label>
    </div>
  </div>
</aside>

<div id="cy">
  <footer>Click a node to inspect · Drag to pan · Scroll to zoom</footer>
</div>

<aside class="right">
  <div class="section" id="view-section" style="display:none;">
    <h2 class="view-section-header" id="view-section-header">
      <span id="view-name"></span>
      <button class="view-toggle" id="view-toggle" aria-label="Toggle narrative">▾</button>
    </h2>
    <div class="view-narrative" id="view-narrative"></div>
  </div>

  <div class="section">
    <h2>Selection</h2>
    <div class="detail-panel" id="detail">
      <div class="empty">Select a node to see its description and incident edges.</div>
    </div>
  </div>
</aside>

<script>
// === GRAPH DATA (embedded) ===
const GRAPH_DATA = {"nodes": [{"id": "iso", "name": "ISO/RTO", "category": "actor", "subcategory": "operator", "description": "Operates centralized wholesale markets and grid in restructured regions. Clears DAM/RTM/AS/capacity/FTR, runs SCUC/SCED, performs state estimation and contingency analysis. Acts in three roles: market operator (regulation edges), settlement administrator (information edges), and central counterparty for cleared transactions and ISO-administered tariffs (money edges into and out of the markets it runs).", "source": "", "views": ["dam-runs", "rtm-runs", "ftr-runs", "capacity-runs"]}, {"id": "to", "name": "Transmission Owner", "category": "actor", "subcategory": "operator", "description": "Owns and maintains transmission assets. May or may not be the same legal entity as the operator. Recovers capital via OATT and revenue requirement.", "source": "", "views": []}, {"id": "generators", "name": "Generators", "category": "actor", "subcategory": "participant", "description": "Physical suppliers of energy and capacity: generator firms, IPPs, storage operators, hybrid resources. Hold the physical assets that bid into wholesale markets and go through interconnection. Distinct from LSEs (which are buyers) and traders (which hold only financial positions).", "source": "", "views": ["dam-runs", "rtm-runs", "capacity-runs"]}, {"id": "lses", "name": "LSEs", "category": "actor", "subcategory": "participant", "description": "Load-serving entities: vertically integrated utilities, competitive retailers, munis, co-ops. Buy wholesale energy and capacity on behalf of end customers, hold the retail relationship, nominate ARRs, and are the obligated entity for state policies like RPS.", "source": "", "views": ["dam-runs", "rtm-runs", "ftr-runs", "capacity-runs"]}, {"id": "traders", "name": "Financial Traders", "category": "actor", "subcategory": "participant", "description": "Participants without physical assets or retail load: virtual bidders, FTR-only traders, marketers without obligations. Take financial positions in DAM, RTM, FTR auctions, and bilateral OTC instruments; not subject to NERC GO/GOP standards, capacity obligations, or interconnection.", "source": "", "views": ["dam-runs", "ftr-runs"]}, {"id": "customers", "name": "End Customers", "category": "actor", "subcategory": "participant", "description": "Residential, commercial, industrial consumers. Includes large flexible loads (data centers, electrolyzers) as a contested sub-category.", "source": "", "views": []}, {"id": "ferc", "name": "FERC", "category": "actor", "subcategory": "regulator", "description": "Federal regulator with jurisdiction over wholesale markets and interstate transmission. Approves ISO tariffs, issues orders, adjudicates disputes. Also has statutory oversight of NERC and approves its reliability standards.", "source": "", "views": []}, {"id": "puc", "name": "State PUCs", "category": "actor", "subcategory": "regulator", "description": "State public utility commissions. Regulate retail rates, distribution, and (in vertically integrated states) generation.", "source": "", "views": ["capacity-runs"]}, {"id": "nerc", "name": "NERC", "category": "actor", "subcategory": "regulator", "description": "North American Electric Reliability Corporation and regional entities. Sets and enforces reliability standards under FERC oversight (EPAct 2005).", "source": "", "views": []}, {"id": "legislature", "name": "State Legislatures", "category": "actor", "subcategory": "regulator", "description": "State legislative bodies and energy offices. Set policy goals via RPS, decarbonization mandates, RA targets.", "source": "", "views": ["capacity-runs"]}, {"id": "dam", "name": "DAM", "category": "mechanism", "subcategory": "market", "description": "Day-ahead energy market. Clears the next-day hourly schedule via SCUC. Includes RUC (reliability unit commitment) as supplemental process. Produces hourly LMPs and cleared schedules; the ISO uses these to settle.", "source": "", "views": ["dam-runs", "rtm-runs", "ftr-runs"]}, {"id": "rtm", "name": "RTM", "category": "mechanism", "subcategory": "market", "description": "Real-time energy market. Clears in 5-min intervals via SCED. Settles deviations from DAM positions at RTM LMPs.", "source": "", "views": ["dam-runs", "rtm-runs", "ftr-runs"]}, {"id": "as", "name": "AS Markets", "category": "mechanism", "subcategory": "market", "description": "Ancillary service markets \u2014 regulation, spinning, non-spinning, ramping. Co-optimized with energy in DAM and RTM.", "source": "", "views": ["dam-runs", "rtm-runs"]}, {"id": "capacity", "name": "Capacity Market", "category": "mechanism", "subcategory": "market", "description": "Multi-year forward procurement of capacity obligations (PJM RPM, ISO-NE FCM, NYISO ICAP, MISO PRA). CAISO and ERCOT use alternative mechanisms.", "source": "", "views": ["capacity-runs"]}, {"id": "ftr", "name": "FTR Auction", "category": "mechanism", "subcategory": "market", "description": "Long-term, annual, and monthly auctions of congestion hedges. Cleared via simultaneous feasibility test (SFT) on a network model. FTRs are settled against DAM congestion.", "source": "", "views": ["dam-runs", "ftr-runs"]}, {"id": "bilateral", "name": "Bilateral Markets", "category": "mechanism", "subcategory": "market", "description": "The OTC layer of the liquidity gradient. Includes physical PPAs and tolling agreements, bilateral RA, and financial CFDs and basis swaps. No central clearing \u2014 each contract is negotiated between counterparties \u2014 but settlement references are largely standardized (DAM LMPs as the energy reference; capacity revenues as a WTP driver). The structural seam between merchant economics and load-serving procurement.", "source": "", "views": ["dam-runs", "capacity-runs"]}, {"id": "interconnection", "name": "Interconnection Process", "category": "mechanism", "subcategory": "process", "description": "The queue and study process for connecting new generation to the grid. Increasingly auction-like; allocates network upgrade costs and queue position.", "source": "", "views": []}, {"id": "arr", "name": "ARR Allocation", "category": "mechanism", "subcategory": "process", "description": "Administrative assignment of FTR auction revenues to LSEs, based on historical load and transmission cost responsibility. Paired with FTR auction but mechanically distinct \u2014 no clearing, just a formula.", "source": "", "views": ["ftr-runs"]}, {"id": "oatt", "name": "Transmission Tariffs", "category": "mechanism", "subcategory": "tariff", "description": "Open Access Transmission Tariff, transmission service rates, transmission revenue requirement, and RMR contracts. FERC-regulated. Determines the charges transmission users (generators, LSEs, traders) owe and the cost-of-service revenues TOs recover; the ISO administers collection and remittance.", "source": "", "views": ["ftr-runs"]}, {"id": "retail", "name": "Retail Tariffs", "category": "mechanism", "subcategory": "tariff", "description": "Retail rate structures set by state PUCs. Pass through wholesale energy, capacity, transmission, ARR credits, and policy adders. The administratively-set far end of the liquidity gradient.", "source": "", "views": []}], "edges": [{"source": "ferc", "target": "iso", "type": "regulation", "description": "FERC approves ISO tariff, market rules, and major design changes. Jurisdictional authority over wholesale markets.", "citation": "", "views": []}, {"source": "ferc", "target": "to", "type": "regulation", "description": "FERC approves transmission rates and Open Access Transmission Tariff (OATT). Order 1000 mandated regional planning.", "citation": "", "views": []}, {"source": "ferc", "target": "nerc", "type": "regulation", "description": "FERC oversight of NERC under EPAct 2005 \u2014 approves NERC's reliability standards, sanctions enforcement actions, and may direct standards development.", "citation": "", "views": []}, {"source": "ferc", "target": "generators", "type": "regulation", "description": "FERC regulates wholesale generator conduct: market power mitigation, market-based rate (MBR) authority (including for bilateral wholesale sales), must-offer rules, anti-manipulation, asset divestiture conditions.", "citation": "", "views": []}, {"source": "ferc", "target": "lses", "type": "regulation", "description": "FERC regulates LSE wholesale market behavior \u2014 participation in capacity, energy, and ancillary services markets; cost allocation under FERC tariffs.", "citation": "", "views": []}, {"source": "ferc", "target": "traders", "type": "regulation", "description": "FERC regulates financial market participation across cleared markets and bilateral OTC instruments: anti-manipulation (Order 670), capital/credit requirements for virtual and FTR trading, affiliate transaction rules.", "citation": "", "views": []}, {"source": "ferc", "target": "dam", "type": "regulation", "description": "FERC approves DAM design including offer caps, mitigation, and clearing rules.", "citation": "", "views": []}, {"source": "ferc", "target": "rtm", "type": "regulation", "description": "FERC approves RTM design, scarcity pricing constructs, and operating reserve demand curves where applicable.", "citation": "", "views": []}, {"source": "ferc", "target": "as", "type": "regulation", "description": "FERC approves AS product definitions and procurement rules.", "citation": "", "views": []}, {"source": "ferc", "target": "capacity", "type": "regulation", "description": "FERC approves capacity market design including accreditation, mitigation, and demand curves. Site of major contestation (MOPR, ELCC reforms).", "citation": "", "views": []}, {"source": "ferc", "target": "ftr", "type": "regulation", "description": "FERC approves FTR auction design and SFT methodology.", "citation": "", "views": []}, {"source": "ferc", "target": "arr", "type": "regulation", "description": "FERC approves ARR allocation formula in ISO tariff.", "citation": "", "views": []}, {"source": "ferc", "target": "oatt", "type": "regulation", "description": "FERC sets OATT transmission service rates, transmission revenue requirements, and approves RMR contracts. Order 1000 mandated regional planning and cost allocation.", "citation": "", "views": []}, {"source": "ferc", "target": "interconnection", "type": "regulation", "description": "FERC sets interconnection process rules. Order 2023 mandated cluster studies and other reforms.", "citation": "", "views": []}, {"source": "puc", "target": "lses", "type": "regulation", "description": "State PUCs regulate LSE certification, retail conduct, and procurement obligations (IRP filings, RPS compliance reporting).", "citation": "", "views": []}, {"source": "puc", "target": "customers", "type": "regulation", "description": "State PUCs set retail rate structures, consumer protections, and distribution-level rules.", "citation": "", "views": []}, {"source": "puc", "target": "retail", "type": "regulation", "description": "State PUCs approve retail tariffs and distribution rates. Primary venue for ratemaking proceedings.", "citation": "", "views": []}, {"source": "puc", "target": "interconnection", "type": "regulation", "description": "State PUCs handle distribution-level interconnection (FERC handles transmission-level).", "citation": "", "views": []}, {"source": "puc", "target": "to", "type": "regulation", "description": "State PUCs hold siting authority over in-state transmission lines and review certificates of public convenience and necessity (CPCNs). The state/federal seam in transmission expansion \u2014 contested under FERC's Order 1000 backstop siting authority.", "citation": "", "views": []}, {"source": "nerc", "target": "iso", "type": "regulation", "description": "NERC reliability standards constrain ISO operations (e.g., BAL standards on balancing authority performance).", "citation": "", "views": []}, {"source": "nerc", "target": "to", "type": "regulation", "description": "NERC reliability standards constrain TO planning and operations (e.g., TPL planning standards).", "citation": "", "views": []}, {"source": "nerc", "target": "generators", "type": "regulation", "description": "NERC GO/GOP standards apply to generator owners and operators (e.g., PRC protection coordination, MOD modeling requirements).", "citation": "", "views": []}, {"source": "legislature", "target": "puc", "type": "regulation", "description": "State legislatures set the statutory framework PUCs operate within. RPS, clean energy mandates, ratemaking principles.", "citation": "", "views": []}, {"source": "legislature", "target": "lses", "type": "regulation", "description": "State policies (RPS, carbon pricing pass-through, retail competition rules) directly bind LSEs as the obligated entity.", "citation": "", "views": []}, {"source": "iso", "target": "dam", "type": "regulation", "description": "ISO operates DAM and sets implementation rules within the FERC-approved tariff.", "citation": "", "views": []}, {"source": "iso", "target": "rtm", "type": "regulation", "description": "ISO operates RTM and dispatches in real-time.", "citation": "", "views": []}, {"source": "iso", "target": "as", "type": "regulation", "description": "ISO operates AS markets, sets product specifications and procurement quantities.", "citation": "", "views": []}, {"source": "iso", "target": "capacity", "type": "regulation", "description": "ISO runs capacity auction, sets accreditation rules, demand curves, locational constraints.", "citation": "", "views": []}, {"source": "iso", "target": "ftr", "type": "regulation", "description": "ISO runs FTR auction, performs SFT, defines feasibility region.", "citation": "", "views": []}, {"source": "iso", "target": "arr", "type": "regulation", "description": "ISO administers ARR allocation per tariff formula.", "citation": "", "views": []}, {"source": "iso", "target": "interconnection", "type": "regulation", "description": "ISO runs interconnection studies, sets queue rules, allocates network upgrade costs.", "citation": "", "views": []}, {"source": "capacity", "target": "dam", "type": "regulation", "description": "Must-offer obligations from capacity market constrain how cleared capacity must bid into DAM.", "citation": "", "views": []}, {"source": "generators", "target": "dam", "type": "action", "description": "Generators submit supply offers (energy curves, start/min-run constraints). Defines the supply side of SCUC.", "citation": "", "views": ["dam-runs"]}, {"source": "lses", "target": "dam", "type": "action", "description": "LSEs submit demand bids (price-sensitive or self-scheduled) to procure next-day energy on behalf of load.", "citation": "", "views": ["dam-runs"]}, {"source": "traders", "target": "dam", "type": "action", "description": "Virtual bidders submit financial increments and decrements to arbitrage the DAM-RTM seam; FTR traders may submit DAM bids tied to congestion positions.", "citation": "", "views": ["dam-runs"]}, {"source": "generators", "target": "rtm", "type": "action", "description": "Generators follow ISO dispatch instructions and may update offers in real-time within tariff limits.", "citation": "", "views": ["dam-runs", "rtm-runs"]}, {"source": "lses", "target": "rtm", "type": "action", "description": "LSEs self-schedule load and operate DR programs and wholesale-passthrough retail products on behalf of customers; settle imbalance against RTM LMPs.", "citation": "", "views": ["rtm-runs"]}, {"source": "generators", "target": "as", "type": "action", "description": "Generators (and storage, hybrid resources) offer reserve and regulation capability into co-optimized energy/AS clearing.", "citation": "", "views": ["dam-runs", "rtm-runs"]}, {"source": "generators", "target": "capacity", "type": "action", "description": "Generators (and increasingly storage, hybrid resources) offer capacity supply obligations into the auction.", "citation": "", "views": ["capacity-runs"]}, {"source": "traders", "target": "ftr", "type": "action", "description": "Financial traders bid on path-based congestion rights, taking positions against expected DAM congestion patterns.", "citation": "", "views": ["ftr-runs"]}, {"source": "lses", "target": "ftr", "type": "action", "description": "LSEs self-convert ARRs to FTRs or bid in the FTR auction to hedge congestion exposure on their load.", "citation": "", "views": ["ftr-runs"]}, {"source": "lses", "target": "arr", "type": "action", "description": "LSEs nominate ARRs against their load-and-transmission-cost obligations and choose to take cash or self-convert to FTRs.", "citation": "", "views": ["ftr-runs"]}, {"source": "generators", "target": "interconnection", "type": "action", "description": "Generators submit interconnection applications, fund studies, negotiate LGIAs and network upgrade cost allocation.", "citation": "", "views": []}, {"source": "customers", "target": "puc", "type": "action", "description": "Consumer advocates and individual large customers intervene in PUC proceedings \u2014 rate cases, RPS dockets, large-load policy.", "citation": "", "views": []}, {"source": "customers", "target": "ferc", "type": "action", "description": "Large customers (data center coalitions, industrial loads) and consumer advocates intervene at FERC on transmission cost allocation, interconnection rules (Order 2023), and large-load capacity treatment.", "citation": "", "views": []}, {"source": "customers", "target": "bilateral", "type": "action", "description": "Large customers (corporate buyers, industrial loads) originate corporate PPAs and virtual PPAs directly with generators or traders. Distinct from LSE-mediated retail procurement.", "citation": "", "views": []}, {"source": "generators", "target": "ferc", "type": "action", "description": "Generators file complaints, intervene in proceedings, request tariff changes, file market-based rate updates.", "citation": "", "views": []}, {"source": "lses", "target": "ferc", "type": "action", "description": "LSEs intervene in tariff filings, file complaints over cost allocation, participate in capacity market proceedings.", "citation": "", "views": []}, {"source": "traders", "target": "ferc", "type": "action", "description": "Financial traders intervene in FTR and virtual-bidding proceedings, file complaints over uplift and revenue adequacy.", "citation": "", "views": []}, {"source": "lses", "target": "puc", "type": "action", "description": "LSEs file rate cases, IRPs, RPS plans, DR program filings, and tariff updates at PUCs.", "citation": "", "views": []}, {"source": "to", "target": "interconnection", "type": "action", "description": "TO conducts interconnection studies (jointly with ISO), constructs network upgrades, executes LGIAs.", "citation": "", "views": []}, {"source": "to", "target": "ferc", "type": "action", "description": "TOs file OATT rate cases, transmission revenue requirement updates, formula rate filings, and intervene in regional planning and cost allocation proceedings.", "citation": "", "views": []}, {"source": "generators", "target": "bilateral", "type": "action", "description": "Generators originate, negotiate, and execute bilateral supply contracts: PPAs (physical and financial), tolling agreements, bilateral RA, asset-backed marketing. The principal channel through which merchant economics translate into revenue.", "citation": "", "views": []}, {"source": "lses", "target": "bilateral", "type": "action", "description": "LSEs procure bilateral supply: long-dated PPAs (often RPS-compliant), tolling, bilateral RA for capacity, and basis hedges. The primary hedge for retail load obligations beyond ISO product offerings.", "citation": "", "views": []}, {"source": "traders", "target": "bilateral", "type": "action", "description": "Financial traders enter CFDs, basis swaps, heat-rate options, and other OTC instruments to take or offset risk positions without holding physical assets.", "citation": "", "views": []}, {"source": "generators", "target": "to", "type": "money", "description": "Generators pay network upgrade construction costs directly to TOs per interconnection cost allocation. Project-finance flow with no ongoing settlement.", "citation": "", "views": []}, {"source": "generators", "target": "iso", "type": "money", "description": "Generators pay the ISO their net cleared-market obligations: storage/hybrid charging energy (DAM and RTM), capacity penalties for non-performance, interconnection study deposits, and other ISO-administered charges. The ISO is the legal counterparty for centrally-cleared transactions.", "citation": "", "views": ["dam-runs", "rtm-runs", "capacity-runs"]}, {"source": "lses", "target": "bilateral", "type": "money", "description": "LSE-side bilateral PPA payments \u2014 physical PPAs, tolling, bilateral RA. The principal long-dated hedge for retail load.", "citation": "", "views": []}, {"source": "lses", "target": "iso", "type": "money", "description": "LSEs pay the ISO their net cleared-market obligations: DAM cleared energy at LMP_load, RTM imbalance buys, AS uplift, capacity charges (load-share of system peak \u2014 4CP/5CP/NSPL by ISO), FTR auction buys, and OATT/transmission-service uplift. The single largest outflow on an LSE's balance sheet.", "citation": "", "views": ["dam-runs", "rtm-runs", "ftr-runs", "capacity-runs"]}, {"source": "traders", "target": "iso", "type": "money", "description": "Financial traders pay the ISO for buy-side FTR auction positions, net-negative virtual settlements (when increment/decrement positions clear unfavorably), and any revenue-inadequacy uplift assessments.", "citation": "", "views": ["dam-runs", "ftr-runs"]}, {"source": "customers", "target": "lses", "type": "money", "description": "End customers pay retail bills to LSEs under PUC-approved retail tariff structures. The retail tariff determines the amount; the cash flow is direct.", "citation": "", "views": []}, {"source": "customers", "target": "bilateral", "type": "money", "description": "Large customers (corporate buyers, industrial loads) pay directly into bilateral PPAs and virtual PPAs.", "citation": "", "views": []}, {"source": "iso", "target": "generators", "type": "money", "description": "ISO pays generators their net cleared-market revenues: DAM/RTM energy clearing at LMP_gen, AS awards, capacity revenues. The ISO collects from buyers across all cleared markets and pays sellers from the aggregate pool; congestion rent \u2014 the residual between LMP_load and LMP_gen at congested constraints \u2014 funds FTR settlement.", "citation": "", "views": ["dam-runs", "rtm-runs", "capacity-runs"]}, {"source": "iso", "target": "lses", "type": "money", "description": "ISO pays LSEs ARR cash distributions (per the ARR formula applied to FTR auction revenue), FTR settlements on LSE-held FTRs, RTM credits for DR and curtailment, and occasional uplift credits.", "citation": "", "views": ["dam-runs", "rtm-runs", "ftr-runs"]}, {"source": "iso", "target": "traders", "type": "money", "description": "ISO pays traders FTR congestion settlements (when path positions align with realized DAM congestion) and net-positive virtual settlement revenues.", "citation": "", "views": ["dam-runs", "ftr-runs"]}, {"source": "iso", "target": "to", "type": "money", "description": "ISO remits OATT transmission revenue requirement collections to TOs as cost-of-service compensation.", "citation": "", "views": []}, {"source": "bilateral", "target": "generators", "type": "money", "description": "Bilateral PPA settlements to generators \u2014 physical PPAs, tolling, bilateral RA. Settled financially against DAM LMPs; willingness-to-pay is shaped by capacity revenues (the missing-money debate).", "citation": "", "views": []}, {"source": "iso", "target": "dam", "type": "information", "description": "ISO supplies network model, constraint set, loss factors, contingency list to DAM clearing optimization (SCUC).", "citation": "", "views": ["dam-runs"]}, {"source": "iso", "target": "rtm", "type": "information", "description": "ISO supplies network model and real-time state estimation to RTM clearing (SCED).", "citation": "", "views": ["rtm-runs"]}, {"source": "iso", "target": "ftr", "type": "information", "description": "ISO supplies network model to FTR auction clearing (SFT). Modeling choices here drive revenue adequacy.", "citation": "", "views": ["ftr-runs"]}, {"source": "iso", "target": "capacity", "type": "information", "description": "ISO supplies capacity accreditation values (ELCC, etc.) and locational deliverability constraints.", "citation": "", "views": ["capacity-runs"]}, {"source": "iso", "target": "generators", "type": "information", "description": "ISO publishes prices (LMPs, capacity clearing, AS prices), dispatch instructions, settlement statements, and market notices to generators.", "citation": "", "views": ["dam-runs", "rtm-runs"]}, {"source": "iso", "target": "lses", "type": "information", "description": "ISO publishes prices, settlement statements, capacity obligations, and market notices to LSEs.", "citation": "", "views": []}, {"source": "iso", "target": "traders", "type": "information", "description": "ISO publishes prices, FTR auction results, and settlement statements to financial traders.", "citation": "", "views": []}, {"source": "iso", "target": "to", "type": "information", "description": "ISO sends outage approvals, dispatch coordination, and post-contingency operating instructions to TOs.", "citation": "", "views": []}, {"source": "iso", "target": "ferc", "type": "information", "description": "ISO reports market outcomes, performance metrics, and proposed tariff changes.", "citation": "", "views": []}, {"source": "nerc", "target": "ferc", "type": "information", "description": "NERC submits proposed reliability standards, compliance reports, and event analyses to FERC for approval and oversight.", "citation": "", "views": []}, {"source": "to", "target": "iso", "type": "information", "description": "TO provides network topology, equipment ratings, outage schedules to ISO for use in market clearing models.", "citation": "", "views": []}, {"source": "dam", "target": "iso", "type": "information", "description": "DAM clearing produces LMPs and cleared positions. These outputs flow back to the ISO, which uses them as the basis for settlement and as inputs to RTM, FTR settlement, and downstream processes.", "citation": "", "views": ["dam-runs"]}, {"source": "rtm", "target": "iso", "type": "information", "description": "RTM clearing produces 5-minute LMPs and dispatch quantities used by the ISO for imbalance settlement.", "citation": "", "views": ["rtm-runs"]}, {"source": "as", "target": "iso", "type": "information", "description": "AS clearing prices and awarded quantities flow back to the ISO for settlement and dispatch.", "citation": "", "views": []}, {"source": "capacity", "target": "iso", "type": "information", "description": "Capacity auction results (clearing prices, cleared positions) flow back to the ISO for billing and obligation tracking.", "citation": "", "views": ["capacity-runs"]}, {"source": "ftr", "target": "iso", "type": "information", "description": "FTR auction results (cleared positions, clearing prices) flow to the ISO, which collects auction revenue and uses cleared positions to settle against DAM congestion.", "citation": "", "views": ["ftr-runs"]}, {"source": "arr", "target": "iso", "type": "information", "description": "ARR allocation outputs (ARR awards by LSE and path) flow to the ISO, which uses them to disburse ARR cash and to determine self-conversion eligibility in the FTR auction.", "citation": "", "views": ["ftr-runs"]}, {"source": "interconnection", "target": "iso", "type": "information", "description": "Interconnection outputs (queue position, study results, signed LGIAs, network upgrade plans) flow to the ISO and update the resource model used by DAM/RTM/capacity.", "citation": "", "views": []}, {"source": "dam", "target": "rtm", "type": "information", "description": "DAM unit commitment \u2014 which generators are committed for each hour, including minimum runs and ramp schedules \u2014 is the binding input to RTM dispatch. RTM (SCED) optimizes 5-min dispatch within the DAM-committed envelope; it cannot generally re-commit units in real time.", "citation": "", "views": ["dam-runs", "rtm-runs"]}, {"source": "dam", "target": "as", "type": "information", "description": "Energy and AS are co-optimized; AS clearing prices reflect the opportunity cost of providing reserves vs. energy.", "citation": "", "views": ["dam-runs"]}, {"source": "rtm", "target": "as", "type": "information", "description": "Real-time energy and AS are co-optimized; AS deployment occurs in real-time.", "citation": "", "views": ["rtm-runs"]}, {"source": "rtm", "target": "arr", "type": "information", "description": "Historical load data from RTM settlements feeds the ARR allocation formula.", "citation": "", "views": ["ftr-runs"]}, {"source": "oatt", "target": "arr", "type": "information", "description": "Transmission cost allocation under OATT feeds the ARR allocation formula.", "citation": "", "views": ["ftr-runs"]}, {"source": "oatt", "target": "iso", "type": "information", "description": "OATT tariff schedule determines the transmission charges the ISO collects from transmission users (generators, LSEs, traders) and remits to TOs. The mechanical price signal behind the OATT/TRR money flow.", "citation": "", "views": []}, {"source": "ftr", "target": "arr", "type": "information", "description": "FTR auction revenue is the funding source for ARR allocation distributions. Both flows pass through the ISO, but the structural dependency is FTR-auction-revenue \u2192 ARR-pool.", "citation": "", "views": ["ftr-runs"]}, {"source": "dam", "target": "ftr", "type": "information", "description": "DAM congestion clearing produces the congestion rents (collected by the ISO from load) that fund FTR settlements. Revenue inadequacy emerges when these rents don't fund cleared FTRs in full.", "citation": "", "views": ["dam-runs", "ftr-runs"]}, {"source": "dam", "target": "bilateral", "type": "information", "description": "DAM LMPs are the standard settlement reference for most bilateral hedges, PPAs, and CFDs. The DAM-bilateral link is what makes the OTC layer financially coherent.", "citation": "", "views": ["dam-runs"]}, {"source": "capacity", "target": "bilateral", "type": "information", "description": "Capacity market revenues shape bilateral PPA willingness-to-pay and the structure of capacity-inclusive vs energy-only contracts \u2014 the missing-money question lives in this edge.", "citation": "", "views": ["capacity-runs"]}, {"source": "retail", "target": "customers", "type": "information", "description": "Retail tariff structure determines what customers owe: passes through wholesale energy, capacity, transmission, ARR credits, and policy adders.", "citation": "", "views": []}, {"source": "puc", "target": "capacity", "type": "information", "description": "State PUC actions \u2014 IRP outcomes, OOM (out-of-market) payments, state subsidies, retail-side resource preferences \u2014 create signals the capacity market design must accommodate. The MOPR debate lives in this edge.", "citation": "", "views": ["capacity-runs"]}, {"source": "legislature", "target": "capacity", "type": "information", "description": "State RPS targets, clean-resource mandates, and decarbonization goals drive capacity accreditation reforms (ELCC methodology fights, clean-resource carve-outs).", "citation": "", "views": ["capacity-runs"]}], "views": [{"id": "dam-runs", "name": "How the DAM runs", "default_edge_types": ["action", "information", "money"], "layout": "concentric", "focus": "dam", "narrative": "The DAM is the day-ahead energy market \u2014 it produces hourly LMPs, unit commitments, and cleared positions that drive the next day of operations and the financial baseline for nearly everything downstream. This view walks the sequence: bidding \u2192 clearing \u2192 outputs \u2192 operating day \u2192 settlement.\n\n**1. Bidding (day-ahead, before ~11am).** Three participant types submit positions:\n\n- **Generators** submit supply offers \u2014 energy curves, start-up and minimum-run constraints (`generators \u2192 dam` action). Storage and hybrid resources may be net buyers when scheduling charging.\n- **Generators also offer AS** capability simultaneously \u2014 regulation, spinning, non-spin, ramping (`generators \u2192 as` action). AS is co-optimized with energy in the same clearing engine.\n- **LSEs** submit demand bids \u2014 price-sensitive or self-scheduled load (`lses \u2192 dam` action).\n- **Traders** submit financial increments and decrements \u2014 virtual bids that arbitrage the DAM\u2013RTM seam (`traders \u2192 dam` action).\n\n**2. Clearing (day-ahead, ~1-4pm).** The ISO supplies the clearing engine with the network model, binding constraint set, loss factors, and contingency list (`iso \u2192 dam` information). SCUC (security-constrained unit commitment) co-optimizes energy with ancillary services \u2014 `dam \u2192 as` (information) captures this \u2014 and produces hourly LMPs, cleared MW positions per node, and a unit commitment schedule.\n\n**3. Outputs.** Clearing results flow back to the ISO for settlement (`dam \u2192 iso` information). Downstream consumers of DAM outputs:\n\n- The **unit commitment** flows to RTM (`dam \u2192 rtm` information) \u2014 RTM dispatches within this envelope.\n- **DAM congestion** drives FTR settlement (`dam \u2192 ftr` information) \u2014 congestion rent funds FTR holder payouts.\n- **DAM LMPs** are the standard reference for bilateral PPA settlement (`dam \u2192 bilateral` information).\n\n**4. Operating day.** Generators follow real-time dispatch (`generators \u2192 rtm` action) within the DAM-committed envelope. RTM (SCED) optimizes 5-min dispatch and produces RTM LMPs.\n\n**5. Settlement.** Cash flows through the ISO as central counterparty: `lses/generators/traders \u2192 iso` (money) bundles each actor's DAM share with their other cleared-market positions; `iso \u2192 generators/lses/traders` (money) bundles the corresponding payouts. The DAM-specific component lives in `dam \u2192 iso` (information): cleared LMPs and positions are the data the ISO uses to compute the DAM portion of net settlement.\n\nThe residual at congested nodes \u2014 `(LMP_load \u2212 LMP_gen) \u00d7 flow` \u2014 is the **congestion rent**. The ISO holds this from DAM clearing and routes it to FTR settlement.\n\n**Why this matters.** The DAM is both a price-discovery mechanism AND the principal commitment market. Generators commit physical resources at DAM clearing time and earn revenue at DAM LMPs; LSEs lock in next-day cost exposure at the same prices. Bilateral PPAs reference DAM LMPs, FTR settlements use DAM congestion, and ARR allocation uses historical DAM/RTM patterns. The DAM is the keystone of the cleared wholesale system.\n"}, {"id": "rtm-runs", "name": "How the RTM runs", "default_edge_types": ["action", "information", "money"], "layout": "concentric", "focus": "rtm", "narrative": "The RTM is the real-time energy market \u2014 it dispatches the actual MW that flows on the grid, in 5-minute intervals, within the unit commitment envelope set by DAM. RTM produces real-time LMPs and settles deviations from DAM positions.\n\n**1. Inputs.** RTM dispatch is bound by two things:\n\n- **DAM unit commitment** (`dam \u2192 rtm` information) \u2014 which generators are committed, at what minimum/maximum, and on what ramp schedules. RTM cannot generally re-commit units in real time; it dispatches within the DAM-committed envelope.\n- **ISO state estimation and network model** (`iso \u2192 rtm` information) \u2014 real-time grid state, contingency list, telemetry-driven.\n\n**2. Clearing.** SCED (security-constrained economic dispatch) runs every 5 minutes. It optimizes generator output within the committed envelope to meet load, manage flows, and co-optimize with AS deployment (`rtm \u2192 as` information: real-time AS deployment is decided alongside energy).\n\n**3. Actions during the operating day:**\n\n- **Generators** follow dispatch instructions issued by the ISO (`generators \u2192 rtm` action, `iso \u2192 generators` information for dispatch signals).\n- **Generators offer AS in real time** alongside energy (`generators \u2192 as` action).\n- **LSEs** can self-schedule load and operate DR programs and wholesale-passthrough retail products \u2014 paid for curtailment when load drops below DAM-cleared position (`lses \u2192 rtm` action).\n\n**4. Outputs.** 5-min LMPs and dispatch quantities flow back to the ISO (`rtm \u2192 iso` information) for settlement and downstream operational coordination.\n\n**5. Settlement.** Money flows through the ISO as central counterparty. The RTM-specific component is bundled into the same aggregate edges as DAM: `lses/generators \u2192 iso` (money) and `iso \u2192 generators/lses` (money) carry net positions across all cleared markets. RTM-specific signals:\n\n- LSEs whose actual load exceeded their DAM-cleared position pay imbalance \u00d7 RTM LMP into `lses \u2192 iso` (money).\n- LSEs paid for curtailment (DR) receive credits via `iso \u2192 lses` (money).\n- Generators dispatched above their DAM-cleared position receive imbalance revenue via `iso \u2192 generators` (money).\n\n**The key structural fact.** RTM does not \"settle against\" DAM in any cash sense \u2014 they're separate settlement runs the ISO sums. DAM commits and prices the day-ahead schedule; RTM dispatches and prices real-time deviations. The seam between them is what virtual bidders arbitrage in DAM (`traders \u2192 dam` action, hidden in this view but conceptually present).\n\n**Scarcity pricing and ORDC.** In ISOs with scarcity pricing or operating-reserve-demand-curves (e.g., ERCOT's ORDC), RTM LMPs can spike well above DAM LMPs during shortage events. This is where most of a generator's lifetime revenue can come from in energy-only markets.\n"}, {"id": "ftr-runs", "name": "How the FTR auction (and ARR) runs", "default_edge_types": ["action", "information", "money"], "layout": "concentric", "focus": "ftr", "narrative": "The FTR auction allocates rights to collect congestion rents from cleared DAM congestion. ARR (Auction Revenue Rights) is the formula that distributes the FTR auction's revenue to LSEs based on historical load and transmission-cost responsibility. Together they form the wholesale congestion hedging layer.\n\n**1. ARR nomination.** LSEs nominate ARRs based on their qualifying load patterns (`lses \u2192 arr` action). Nominations are vetted against the simultaneous feasibility constraints \u2014 the same network model that constrains FTR clearing.\n\n**2. The ARR formula.** Three inputs drive the allocation:\n\n- **Historical RTM load** by LSE and node (`rtm \u2192 arr` information).\n- **OATT transmission cost allocation** \u2014 load-share of transmission cost responsibility, often coincident with system peaks (`oatt \u2192 arr` information).\n- **FTR auction revenue** \u2014 the funding source the formula distributes (`ftr \u2192 arr` information).\n\nThe formula produces ARR awards by LSE and path, which flow to the ISO for administration (`arr \u2192 iso` information).\n\n**3. FTR auction.** The ISO supplies the network model and feasibility region (`iso \u2192 ftr` information). Traders bid path-based congestion positions (`traders \u2192 ftr` action); LSEs may bid directly or self-convert their ARRs into FTRs (`lses \u2192 ftr` action). The auction clears via simultaneous feasibility test (SFT) \u2014 the cleared set must be deliverable on the network model. Auction results flow back to the ISO (`ftr \u2192 iso` information).\n\n**4. Funding source.** DAM congestion produces congestion rent \u2014 the residual between LMP_load and LMP_gen at congested constraints (`dam \u2192 ftr` information). The ISO collects this rent from DAM clearings and routes it to FTR settlement.\n\n**5. Settlement.** Money flows through the ISO as central counterparty:\n\n- **FTR buys**: `traders \u2192 iso` and `lses \u2192 iso` (money) carry auction-buy payments along with each actor's other cleared-market obligations.\n- **FTR settlements**: `iso \u2192 traders` (money) pays out congestion settlements to FTR holders. `iso \u2192 lses` (money) pays out ARR cash distributions and FTR settlements on LSE-held FTRs.\n- **Net auction revenue funds ARRs**: the chain is mechanically `ftr \u2192 arr` (information) \u2192 ISO administers the ARR formula \u2192 `iso \u2192 lses` (money) for distributions.\n\n**Revenue adequacy.** When realized DAM congestion rent falls short of cleared FTR awards, the auction is revenue-inadequate. Shortfall is uplifted to participants (bundled into `lses \u2192 iso` and `traders \u2192 iso` money edges as revenue-inadequacy assessments). Revenue adequacy is a contested research and design question \u2014 it depends heavily on the network model used for SFT clearing.\n\n**Self-conversion.** LSEs can choose to take ARR cash OR self-convert ARRs into FTRs they hold. Self-conversion gives the LSE a position-based hedge (paying when congestion goes their way, owing when it doesn't) rather than a cash payment. The choice is part of the LSE's hedge strategy.\n"}, {"id": "capacity-runs", "name": "How the capacity market runs", "default_edge_types": ["action", "information", "money"], "layout": "concentric", "focus": "capacity", "narrative": "The capacity market is the wholesale wholesale system's mechanism for procuring forward generation capacity \u2014 committing resources years ahead to ensure adequate supply during peak periods. It exists because energy markets alone may not provide enough revenue to support new investment (the \"missing money\" problem). PJM RPM, ISO-NE FCM, NYISO ICAP, and MISO PRA are the four canonical capacity markets; ERCOT and CAISO use alternative mechanisms.\n\n**1. Accreditation.** Not every nameplate MW counts the same. The ISO determines each resource's *accredited capacity* \u2014 its effective contribution to reliability \u2014 via methodologies like ELCC (effective load carrying capability), particularly for variable resources like wind and solar (`iso \u2192 capacity` information). Accreditation choices are increasingly the contested ground in capacity market design.\n\n**2. Auction.** Generators offer accredited capacity into the auction (`generators \u2192 capacity` action). LSEs' obligation is set administratively based on their load-share of system peak forecast (so LSEs don't directly bid in most designs \u2014 their charge is determined by the formula).\n\nAuctions clear at a system-wide (or zonal) clearing price using a sloped demand curve (the **VRR** \u2014 variable resource requirement \u2014 in PJM; analogous demand curves elsewhere). Demand curves are FERC-approved and are themselves often contested.\n\n**3. Outputs.** Auction results flow back to the ISO (`capacity \u2192 iso` information): cleared prices, cleared positions per zone, locational constraint outcomes. The cleared accredited MW is what gens are committed to deliver during shortage events (must-offer obligation back into DAM).\n\n**4. Settlement.** Money flows through the ISO as central counterparty:\n\n- **LSEs pay capacity charges** via `lses \u2192 iso` (money) \u2014 the capacity component is one of several items bundled in that edge, sized by load-share \u00d7 clearing price.\n- **Generators receive capacity revenue** via `iso \u2192 generators` (money) \u2014 accredited MW \u00d7 clearing price.\n- **Capacity penalties** for non-performance during shortage events flow `generators \u2192 iso` (money).\n\n**5. State-policy signals.** Capacity market design is contested at the state/federal seam because what states want (clean-resource targets, subsidies for in-state resources, retail-side procurement preferences) and what FERC-regulated capacity markets do (clear at a system-wide price, neutral across resource types) are often in tension. Two information edges carry the signal:\n\n- `legislature \u2192 capacity` (information): state RPS targets, decarbonization mandates, and clean-resource statutes drive accreditation reforms \u2014 ELCC methodology for variable resources, carve-outs, clean-capacity considerations.\n- `puc \u2192 capacity` (information): PUC actions \u2014 IRP outcomes, OOM (out-of-market) payments, state subsidies, retail-side resource preferences \u2014 create the operational pressure that surfaces in MOPR fights. State-subsidized resources offering at their actual marginal cost vs. an administrative floor is the canonical version of this debate.\n\nThese are *information* edges, not regulation: state governments don't directly regulate FERC-jurisdictional capacity markets. They send signals that capacity-market designers (FERC, the ISO) have to respond to.\n\n**6. Bilateral interaction \u2014 the missing-money story.** Capacity revenue is one of the principal drivers of bilateral PPA willingness-to-pay (`capacity \u2192 bilateral` information). When capacity prices are high, LSEs can pay more for capacity-inclusive PPAs; when capacity prices are low or absent (energy-only markets), the bilateral layer has to price in the missing capacity revenue itself. This is the structural seam between organized capacity markets and the bilateral hedge layer.\n\n**7. Multi-year structure.** Most capacity auctions clear 3 years forward. This forward horizon is meant to give new-build economics time to develop and finance, but it also creates risk for both buyers (LSE costs locked in years ahead) and sellers (gens commit to deliver well before the operating period).\n\n**The contested questions:**\n\n- **Accreditation methodology** \u2014 how to value intermittent resources (ELCC parameters), storage duration, demand response counted against capacity.\n- **MOPR (Minimum Offer Price Rule)** \u2014 whether state-subsidized resources can offer at their actual marginal cost or must offer at an administrative floor.\n- **Demand curve parameters** \u2014 system-cost-of-new-entry (CONE), demand curve slope, performance assessment intervals.\n- **Whether to have a capacity market at all** \u2014 ERCOT's energy-only model is the alternative, with scarcity pricing instead of forward capacity payments.\n"}]};

// Edge type filtering
document.querySelectorAll('#edge-filters input').forEach(input => {
  const apply = () => {
    const type = input.dataset.type;
    cy.edges(`[type = "${type}"]`).toggleClass('hidden', !input.checked);
    // Re-render selection detail if a node is selected, so the edge list reflects filters
    if (selectedNodeId) renderDetail(cy.getElementById(selectedNodeId));
  };
  input.addEventListener('change', apply);
  apply();
});

// Subcategory (node type) filtering
function applySubcatFilter() {
  // Recompute the set of visible subcategories from checkboxes
  const visible = new Set();
  document.querySelectorAll('[data-subcat]').forEach(input => {
    if (input.checked) visible.add(input.dataset.subcat);
  });
  cy.nodes().forEach(n => {
    n.toggleClass('hidden', !visible.has(n.data('subcategory')));
  });
  // Hide edges whose endpoints are subcategory-hidden — use a distinct class
  // so it doesn't fight with the edge-type filter (which uses .hidden).
  cy.edges().forEach(e => {
    const hide = e.source().hasClass('hidden') || e.target().hasClass('hidden');
    e.toggleClass('subcat-hidden', hide);
  });
  if (selectedNodeId) {
    const sel = cy.getElementById(selectedNodeId);
    if (sel.hasClass('hidden')) {
      cy.elements().removeClass('highlighted faded');
      document.getElementById('detail').innerHTML = '<div class="empty">Select a node to see its description and incident edges.</div>';
      selectedNodeId = null;
    } else {
      renderDetail(sel);
    }
  }
}

document.querySelectorAll('[data-subcat]').forEach(input => {
  input.addEventListener('change', applySubcatFilter);
});
applySubcatFilter();

// Search
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    cy.nodes().removeClass('dim');
    return;
  }
  cy.nodes().forEach(n => {
    const match = n.data('label').toLowerCase().includes(q) || n.data('description').toLowerCase().includes(q);
    n.toggleClass('dim', !match);
  });
});

// Node selection → detail panel + highlighting
function renderDetail(node) {
  const data = node.data();
  // Read current edge-type checkbox state — selection panel respects edge filters
  const activeTypes = new Set();
  document.querySelectorAll('#edge-filters input').forEach(input => {
    if (input.checked) activeTypes.add(input.dataset.type);
  });
  // Also respect view filter and subcategory filter — selection mirrors
  // what's actually visible in the graph.
  const incidentEdges = cy.edges().filter(e => {
    if (e.source().id() !== data.id && e.target().id() !== data.id) return false;
    if (!activeTypes.has(e.data('type'))) return false;
    if (e.hasClass('out-of-view')) return false;
    // Skip if the other end is a hidden node
    const other = e.source().id() === data.id ? e.target() : e.source();
    if (other.hasClass('hidden')) return false;
    return true;
  });

  const incoming = [];
  const outgoing = [];
  incidentEdges.forEach(e => {
    const ed = e.data();
    if (ed.source === data.id) {
      outgoing.push({ other: nodeById[ed.target], type: ed.type, desc: ed.description, dir: 'out' });
    } else {
      incoming.push({ other: nodeById[ed.source], type: ed.type, desc: ed.description, dir: 'in' });
    }
  });

  // Sort by type for readability
  const order = { action: 0, money: 1, regulation: 2, information: 3 };
  outgoing.sort((a, b) => order[a.type] - order[b.type]);
  incoming.sort((a, b) => order[a.type] - order[b.type]);

  const renderEdge = (e) => `
    <div class="edge-item">
      <div class="edge-header">
        <span class="type-tag ${e.type}">${e.type}</span>
        <span class="arrow">${e.dir === 'out' ? '→' : '←'}</span>
        <span class="other-node">${e.other.name}</span>
      </div>
      <div class="edge-desc">${e.desc}</div>
    </div>
  `;

  document.getElementById('detail').innerHTML = `
    <h3>${data.label}</h3>
    <div class="category-tag">${data.category} · ${data.subcategory}</div>
    <div class="description">${data.description}</div>
    <h4>Outgoing (${outgoing.length})</h4>${outgoing.map(renderEdge).join('')}
    <h4>Incoming (${incoming.length})</h4>${incoming.map(renderEdge).join('')}
  `;
}

cy.on('tap', 'node', (evt) => {
  const node = evt.target;
  selectedNodeId = node.id();
  // Highlight neighborhood
  cy.elements().removeClass('highlighted faded');
  const neighborhood = node.closedNeighborhood();
  cy.elements().not(neighborhood).addClass('faded');
  neighborhood.addClass('highlighted');
  renderDetail(node);
});

cy.on('tap', (evt) => {
  if (evt.target === cy) {
    selectedNodeId = null;
    cy.elements().removeClass('highlighted faded');
    document.getElementById('detail').innerHTML = '<div class="empty">Select a node to see its description and incident edges.</div>';
  }
});

function renderNarrative(md) {
  // Minimal markdown: paragraphs, **bold**, *italic*, `code`, - bullets.
  const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = md.split('\n');
  const out = [];
  let para = [];
  let bullets = [];
  const flushPara = () => {
    if (para.length) {
      out.push('<p>' + inline(para.join(' ')) + '</p>');
      para = [];
    }
  };
  const flushBullets = () => {
    if (bullets.length) {
      out.push('<ul>' + bullets.map(b => '<li>' + inline(b) + '</li>').join('') + '</ul>');
      bullets = [];
    }
  };
  const inline = s => escapeHtml(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|\W)\*([^*]+)\*(\W|$)/g, '$1<em>$2</em>$3');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { flushPara(); flushBullets(); continue; }
    if (trimmed.startsWith('- ')) {
      flushPara();
      bullets.push(trimmed.slice(2));
    } else {
      flushBullets();
      para.push(trimmed);
    }
  }
  flushPara(); flushBullets();
  return out.join('');
}

function countViewElements(view) {
  const allowedTypes = new Set(view.default_edge_types || []);
  const nodeSet = new Set(GRAPH_DATA.nodes.filter(n => (n.views || []).includes(view.id)).map(n => n.id));
  // Strict mode: if any edges are tagged with this view, ONLY tagged edges
  // count. The "both endpoints + type" fallback only applies when no edges
  // are tagged for this view.
  const strict = GRAPH_DATA.edges.some(e => (e.views || []).includes(view.id));
  const edgeCount = GRAPH_DATA.edges.filter(e => {
    if (strict) return (e.views || []).includes(view.id);
    return nodeSet.has(e.source) && nodeSet.has(e.target) && allowedTypes.has(e.type);
  }).length;
  return { nodes: nodeSet.size, edges: edgeCount };
}

function populateViewList() {
  const list = document.getElementById('view-list');
  const allBtn = list.querySelector('button[data-view=""]');
  if (allBtn) {
    allBtn.innerHTML = `<div class="view-btn-name">All</div><div class="view-btn-meta">${GRAPH_DATA.nodes.length} nodes · ${GRAPH_DATA.edges.length} edges</div>`;
  }
  for (const v of VIEWS) {
    const btn = document.createElement('button');
    btn.className = 'view-btn';
    btn.dataset.view = v.id;
    const counts = countViewElements(v);
    btn.innerHTML = `<div class="view-btn-name">${v.name}</div><div class="view-btn-meta">${counts.nodes} nodes · ${counts.edges} edges</div>`;
    list.appendChild(btn);
  }
  list.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => activateView(btn.dataset.view));
  });
}

function activateView(viewId) {
  // Update button state
  document.querySelectorAll('#view-list .view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === viewId);
  });

  if (!viewId) {
    // Clear view: show everything, restore default edge filters
    cy.elements().removeClass('out-of-view');
    document.getElementById('view-section').style.display = 'none';
    // Re-apply edge-type checkbox states (regulation default-off)
    document.querySelectorAll('#edge-filters input').forEach(input => {
      input.dispatchEvent(new Event('change'));
    });
    return;
  }

  const view = VIEWS_BY_ID[viewId];
  if (!view) return;

  // Filter nodes: any node tagged with this view is in
  cy.nodes().forEach(n => {
    const nodeViews = n.data('views') || [];
    n.toggleClass('out-of-view', !nodeViews.includes(viewId));
  });

  // Strict mode: if any edges are tagged with this view, ONLY tagged edges
  // are in-view. Otherwise fall back to both-endpoints + type-allowed.
  const allowedTypes = new Set(view.default_edge_types || []);
  const strict = GRAPH_DATA.edges.some(e => (e.views || []).includes(viewId));
  cy.edges().forEach(e => {
    const edgeViews = e.data('views') || [];
    let inView;
    if (strict) {
      inView = edgeViews.includes(viewId);
    } else {
      const srcIn = !e.source().hasClass('out-of-view');
      const tgtIn = !e.target().hasClass('out-of-view');
      const typeAllowed = allowedTypes.has(e.data('type'));
      inView = srcIn && tgtIn && typeAllowed;
    }
    e.toggleClass('out-of-view', !inView);
  });

  // Sync the edge-type checkboxes to reflect the view's defaults
  document.querySelectorAll('#edge-filters input').forEach(input => {
    input.checked = allowedTypes.has(input.dataset.type);
  });

  // Render narrative — default to collapsed; user clicks chevron to expand
  const viewSection = document.getElementById('view-section');
  viewSection.style.display = '';
  viewSection.classList.add('collapsed');
  document.getElementById('view-name').textContent = view.name;
  document.getElementById('view-narrative').innerHTML = renderNarrative(view.narrative || '');

  // Re-run the view's preferred layout on visible elements
  if (view.layout) {
    const visible = cy.elements().not('.out-of-view');
    const layoutOpts = { name: view.layout, animate: false, padding: 50 };
    if (view.layout === 'fcose') {
      layoutOpts.nodeRepulsion = 8000;
      layoutOpts.idealEdgeLength = 120;
      layoutOpts.edgeElasticity = 0.45;
    } else if (view.layout === 'concentric') {
      layoutOpts.concentric = n => n.data('category') === 'actor' ? 2 : 1;
      layoutOpts.levelWidth = () => 1;
      layoutOpts.minNodeSpacing = 50;
    }
    visible.layout(layoutOpts).run();
    // Sync the layout-selector buttons too
    document.querySelectorAll('.layout-select button').forEach(b => {
      b.classList.toggle('active', b.dataset.layout === view.layout);
    });
  }
}

populateViewList();

// View narrative collapse toggle
document.getElementById('view-section-header').addEventListener('click', () => {
  document.getElementById('view-section').classList.toggle('collapsed');
});
</script>
